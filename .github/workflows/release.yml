name: Release

# Builds the per-browser bundles and creates a GitHub release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build bundles
        run: npm run build

      - name: Extract changelog entry
        run: |
          awk '/^## /{if(found){exit} found=1; next} found' CHANGELOG.md > .latest_changelog.md
          if [ ! -s .latest_changelog.md ]; then
            echo "No changelog entry found under a '## ' heading." >&2
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: .latest_changelog.md
          files: |
            dist/monloader-browser-chrome-*.zip
            dist/monloader-browser-firefox-*.xpi
